<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNOX | AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#0a0a0f;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center}
.gradient-bg{position:fixed;width:100%;height:100%;background:radial-gradient(circle at 20% 80%,#1a0033 0%,transparent 50%),radial-gradient(circle at 80% 20%,#001a33 0%,transparent 50%),radial-gradient(circle at 50% 50%,#0a0a0f 100%);animation:bgShift 15s ease infinite}
@keyframes bgShift{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(60deg)}}
.chat-container{width:95%;max-width:650px;height:95vh;background:rgba(20,20,35,0.4);backdrop-filter:blur(30px) saturate(180%);border:1px solid rgba(255,255,255,0.1);border-radius:35px;box-shadow:0 25px 50px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05);display:flex;flex-direction:column;overflow:hidden;z-index:1}
.header{padding:30px;text-align:center;background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0));border-bottom:1px solid rgba(255,255,255,0.1)}
.brand{display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:8px}
.logo-icon{width:45px;height:45px;background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 20px rgba(139,92,246,0.4);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5deg)}}
.logo-text{font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:700;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.subtitle{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:1.5px;font-weight:400}
.messages{flex:1;padding:35px;overflow-y:auto;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:8px}
.messages::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:10px}
.messages::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#6366f1,#8b5cf6);border-radius:10px}
.msg{margin:20px 0;padding:18px 22px;border-radius:22px;max-width:82%;line-height:1.7;font-size:15px;animation:slideUp 0.5s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(10px)}
@keyframes slideUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
.user{background:linear-gradient(135deg,rgba(99,102,241,0.9),rgba(139,92,246,0.9));margin-left:auto;text-align:right;border-bottom-right-radius:8px;box-shadow:0 10px 30px rgba(99,102,241,0.3);color:#fff}
.knox{background:linear-gradient(135deg,rgba(40,40,60,0.9),rgba(30,30,50,0.9));margin-right:auto;border-bottom-left-radius:8px;border:1px solid rgba(255,255,255,0.1);box-shadow:0 10px 30px rgba(0,0,0,0.3);color:#e2e8f0}
.knox::before{content:'⚡ KNOX';display:block;font-size:11px;font-weight:600;color:#a78bfa;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}
.input-wrapper{padding:25px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.1)}
.input-box{display:flex;gap:12px;align-items:center}
input{flex:1;padding:18px 24px;border:1px solid rgba(255,255,255,0.1);border-radius:18px;background:rgba(255,255,255,0.05);color:#fff;outline:none;font-size:15px;font-family:'Poppins';transition:all 0.3s;backdrop-filter:blur(10px)}
input:focus{border-color:rgba(139,92,246,0.6);background:rgba(255,255,255,0.08);box-shadow:0 0 0 4px rgba(139,92,246,0.1)}
input::placeholder{color:rgba(255,255,255,0.4)}
.send-btn{width:55px;height:55px;border:none;border-radius:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:20px;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 20px rgba(139,92,246,0.4);display:flex;align-items:center;justify-content:center}
.send-btn:hover{transform:scale(1.08) rotate(5deg);box-shadow:0 12px 30px rgba(139,92,246,0.6)}
.send-btn:active{transform:scale(0.95)}
.loading{display:flex;gap:6px;align-items:center}
.dot{width:8px;height:8px;background:linear-gradient(45deg,#6366f1,#8b5cf6);border-radius:50%;animation:bounce 1.4s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0.7);opacity:0.5}40%{transform:scale(1.2);opacity:1}}
@media(max-width:600px){.chat-container{width:100%;height:100vh;border-radius:0}.logo-text{font-size:32px}.messages{padding:25px 20px}}
</style>
</head>
<body>
<div class="gradient-bg"></div>
<div class="chat-container">
  <div class="header">
    <div class="brand">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">KNOX</div>
    </div>
    <div class="subtitle">AI ASSISTANT</div>
  </div>
  <div class="messages" id="messages">
    <div class="msg knox">Line 1: KNOX Online 💀<br>Line 2: Roast + Help, rendu side yum naan dhan 😂<br>Line 3: Tip: Kelvi ketu, answer vaangi 👑</div>
  </div>
  <div class="input-wrapper">
    <div class="input-box">
      <input type="text" id="input" placeholder="Ask KNOX anything..." onkeypress="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://knox-all-rounder-ai.onrender.com/api/knox';
const messages = document.getElementById('messages');
const input = document.getElementById('input');

function addMsg(text, cls){
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMsg(){
  const text = input.value.trim();
  if(!text) return;
  addMsg(text, 'user');
  input.value = '';
  addMsg('<span class="loading">KNOX thinking<span class="dot"></span><span class="dot"></span><span class="dot"></span></span>', 'knox');
  
  try{
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });
    const data = await res.json();
    messages.lastChild.remove();
    addMsg(data.reply, 'knox');
  }catch(e){
    messages.lastChild.remove();
    addMsg('Line 1: Connection failed 💀<br>Line 2: Server thoonitu iruka pola 😂<br>Line 3: Tip: Wait 30sec, mela try panu 👑', 'knox');
  }
}
</script>
</body>
</html>
