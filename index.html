<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNOX ELITE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }

body {
  background: #0a0a0a;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: linear-gradient(90deg, #000, #1a1a1a, #000);
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid gold;
  box-shadow: 0 4px 25px rgba(255,215,0,0.5);
}

h1 {
  color: gold;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 3px;
  text-shadow: 0 0 20px gold;
}
h1::after {
  content: " 👑";
  animation: sparkle 1.5s infinite;
}

@keyframes sparkle {
 0%,100% { opacity: 1; transform: scale(1) rotate(0deg); }
 50% { opacity: 0.6; transform: scale(1.3) rotate(10deg); }
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 25px;
  background: radial-gradient(circle at top, #111 0%, #000 100%);
}

.bubble {
  max-width: 75%;
  padding: 15px 20px;
  margin: 15px 0;
  border-radius: 20px;
  line-height: 1.6;
  font-size: 15px;
  animation: slideIn 0.4s ease;
}

@keyframes slideIn {
  from { opacity:0; transform: translateY(15px); }
  to { opacity:1; transform: translateY(0); }
}

.user {
  background: #1e1e1e;
  margin-left: auto;
  border: 1px solid #333;
}

.knox {
  background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(0,0,0,0.95));
  border: 1.5px solid rgba(255,215,0,0.6);
  box-shadow: 0 0 30px rgba(255,215,0,0.4);
  position: relative;
}
.knox::before {
  content: "👑";
  position: absolute;
  top: -10px;
  left: -10px;
  font-size: 16px;
  filter: drop-shadow(0 0 5px gold);
}

.input-area {
  display: flex;
  padding: 18px;
  background: #000;
  border-top: 2px solid gold;
  gap: 10px;
}

input {
  flex: 1;
  padding: 15px 20px;
  border-radius: 30px;
  border: 1.5px solid gold;
  background: #111;
  color: gold;
  outline: none;
  font-size: 16px;
  transition: 0.3s;
}
input:focus { box-shadow: 0 0 15px rgba(255,215,0,0.5); }
input::placeholder { color: #555; }

button {
  padding: 15px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, gold, #ff8c00);
  color: #000;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}
button:hover { transform: scale(1.08); box-shadow: 0 0 20px gold; }
</style>
</head>
<body>

<header>
  <h1>KNOX ELITE</h1>
</header>

<div class="chat" id="chatBox">
  <div class="bubble knox">
    Line 1: Vanthuten bro 👑<br>
    Line 2: Modes lam odachi potachu 💀<br>
    Line 3: Elite tip: Enakku doubt ketta dhan naan zinda ah irupen ✨
  </div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="KNOX ELITE kitta keku bro...">
  <button onclick="sendMsg()">Send</button>
</div>

<script>
function sendMsg() {
  let input = document.getElementById('userInput');
  let text = input.value.trim();
  if(text === '') return;
  
  addBubble(text, 'user');
  input.value = '';
  
  setTimeout(() => {
    let reply = knoxEliteReply(text);
    addBubble(reply, 'knox');
  }, 800);
}

function addBubble(msg, type) {
  let chat = document.getElementById('chatBox');
  let div = document.createElement('div');
  div.className = 'bubble ' + type;
  div.innerHTML = msg;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function knoxEliteReply(userText) {
  let ans = "Line 1: " + userText + " ah? Naan paathukuren bro 😎<br>";
  
  let roast = [
    "Line 2: Ithu kooda theriyama epdi iruka? Google ku salary waste 💀", 
    "Line 2: Elite ah irundhum ipdi kelvi kekura? Level up panu bro 😂", 
    "Line 2: Nee kekura doubt ku naan dhan last option 🤡"
  ];
  ans += roast[Math.floor(Math.random() * roast.length)] + "<br>";
  
  ans += "Line 3: Elite tip: Tension vida, KNOX iruken la. Nee just keku 👑✨";
  
  return ans;
}

document.getElementById('userInput').addEventListener('keypress', function(e) {
  if(e.key === 'Enter') sendMsg();
});
</script>

</body>
</html>
